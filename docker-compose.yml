version: '3.8'

services:
  websocket-server:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development

  agent-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - websocket-server
